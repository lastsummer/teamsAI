<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級報表</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:     #fafbfc;
      --card:   #ffffff;
      --card2:  #f8f9fa;
      --border: #e8d5e0;
      --gold:   #ff8fb3;
      --jade:   #7dd4c4;
      --purple: #c9a0d8;
      --blue:   #87ceeb;
      --red:    #ff6b9d;
      --orange: #ffb366;
      --text:   #3d3d3d;
      --muted:  #a09a9a;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 10%, rgba(255,143,179,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(125,212,196,.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center;
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 24px; position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .nav-logo {
      color: var(--gold); font-size: 1.1rem; letter-spacing: 3px;
      padding: 14px 24px 14px 0; margin-right: 16px;
      border-right: 1px solid var(--border); white-space: nowrap; flex-shrink: 0;
    }
    .nav-badge {
      font-size: .72rem; padding: 2px 8px; border-radius: 8px;
      background: rgba(74,112,200,.2); color: var(--blue);
      border: 1px solid rgba(74,112,200,.35);
      margin-right: 20px; white-space: nowrap; flex-shrink: 0; letter-spacing: 1px;
    }
    .nav-tabs { display: flex; }
    .nav-tab {
      padding: 16px 24px; cursor: pointer; color: var(--muted);
      font-size: .95rem; border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s; user-select: none; white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Class selector bar ── */
    .class-bar {
      background: var(--card2); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 53px; z-index: 190;
    }
    .class-bar-label { font-size: .78rem; color: var(--muted); flex-shrink: 0; }
    .class-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .class-pill {
      padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: .85rem; transition: all .2s; user-select: none;
    }
    .class-pill:hover { border-color: var(--gold); color: var(--text); }
    .class-pill.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }

    /* ── Pages ── */
    .page { display: none; padding: 28px 24px; max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }
    .page.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-title {
      color: var(--gold); font-size: .95rem; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
    }
    .card-title::before { content: '◆'; font-size: .65rem; opacity: .7; }
    .card-title .card-sub {
      font-size: .72rem; color: var(--muted); font-weight: 400;
      letter-spacing: 0; margin-left: 4px;
    }

    /* ── Stat grid ── */
    .stats-grid-5 {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .stat-card:hover { border-color: var(--gold); box-shadow: 0 0 18px rgba(255,143,179,.12); }
    .stat-label { font-size: .75rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-value.ok     { color: var(--jade); }
    .stat-value.warn   { color: var(--orange); }
    .stat-value.danger { color: var(--red); }
    .stat-unit  { font-size: .75rem; color: var(--muted); margin-top: 5px; }
    .stat-delta { font-size: .72rem; margin-top: 6px; }
    .stat-delta.up   { color: var(--jade); }
    .stat-delta.down { color: var(--red); }

    /* ── Chart rows ── */
    .charts-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .charts-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-full   { margin-bottom: 24px; }

    /* ── Pace indicator ── */
    .pace-wrap { display: flex; align-items: center; gap: 20px; margin-top: 4px; }
    .pace-track {
      flex: 1; height: 12px; background: var(--border);
      border-radius: 6px; position: relative; overflow: hidden;
    }
    .pace-fill {
      height: 100%; border-radius: 6px;
      transition: width .6s ease;
    }
    .pace-label { font-size: .82rem; white-space: nowrap; }
    .pace-zones {
      display: flex; justify-content: space-between;
      font-size: .68rem; color: var(--muted); margin-top: 5px;
    }

    /* ── Activity popularity ── */
    .act-list { display: flex; flex-direction: column; gap: 10px; }
    .act-item { display: flex; align-items: center; gap: 12px; }
    .act-name { font-size: .85rem; min-width: 160px; flex-shrink: 0; }
    .act-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; }
    .act-bar { height: 100%; border-radius: 4px; transition: width .5s ease; }
    .act-count { font-size: .78rem; color: var(--muted); min-width: 40px; text-align: right; }

    /* ── Toggle buttons ── */
    .toggle-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .toggle-btn {
      padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: .82rem; transition: all .2s;
    }
    .toggle-btn:hover { border-color: var(--gold); color: var(--text); }
    .toggle-btn.active { background: #ff8fb3; color: #fff; border-color: #ff8fb3; font-weight: 600; }

    /* ── Risk list ── */
    .risk-section { margin-bottom: 28px; }
    .risk-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: .88rem; letter-spacing: 1px; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .risk-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; padding: 3px 10px; border-radius: 10px;
      font-weight: 600; letter-spacing: .5px;
    }
    .risk-badge.quit  { background: rgba(255,107,157,.12); color: #ff6b9d;    border: 1px solid rgba(255,107,157,.3); }
    .risk-badge.over  { background: rgba(255,179,102,.12); color: #ffb366; border: 1px solid rgba(255,179,102,.3); }
    .risk-badge.watch { background: rgba(201,160,216,.12); color: #c9a0d8; border: 1px solid rgba(201,160,216,.3); }
    .risk-count { font-size: .78rem; color: var(--muted); margin-left: auto; }

    .risk-cards { display: flex; flex-direction: column; gap: 10px; }
    .risk-card {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px; border-radius: 10px;
      background: rgba(255,255,255,.02); border: 1px solid var(--border);
      transition: background .2s;
    }
    .risk-card:hover { background: rgba(255,255,255,.04); }
    .risk-card.quit  { border-left: 3px solid var(--red); }
    .risk-card.over  { border-left: 3px solid var(--orange); }
    .risk-card.watch { border-left: 3px solid var(--purple); }

    .risk-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; color: var(--bg);
    }
    .risk-card.quit  .risk-avatar { background: var(--red); }
    .risk-card.over  .risk-avatar { background: var(--orange); }
    .risk-card.watch .risk-avatar { background: var(--purple); }

    .risk-info { flex: 1; min-width: 0; }
    .risk-name { font-size: .92rem; font-weight: 600; margin-bottom: 3px; }
    .risk-meta { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
    .risk-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .risk-tag {
      font-size: .68rem; padding: 2px 8px; border-radius: 8px;
      background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted);
    }
    .risk-suggestion {
      font-size: .8rem; color: var(--text); line-height: 1.6;
      padding: 8px 10px; border-radius: 6px;
      background: rgba(201,160,216,.1); border: 1px solid rgba(201,160,216,.2);
    }
    .risk-suggestion strong { color: var(--gold); }

    .risk-metrics {
      display: flex; flex-direction: column; gap: 6px;
      align-items: flex-end; flex-shrink: 0; min-width: 110px;
    }
    .risk-metric-row { text-align: right; }
    .risk-metric-val { font-size: 1.1rem; font-weight: 700; }
    .risk-metric-lbl { font-size: .68rem; color: var(--muted); }
    .risk-card.quit  .risk-metric-val { color: var(--red); }
    .risk-card.over  .risk-metric-val { color: var(--orange); }
    .risk-card.watch .risk-metric-val { color: var(--purple); }

    /* ── Export paywall ── */
    .export-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; margin-bottom: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); gap: 16px;
    }
    .export-bar-text { font-size: .85rem; color: var(--muted); line-height: 1.5; }
    .export-bar-text strong { color: var(--text); }
    .export-btns { display: flex; gap: 10px; flex-shrink: 0; }
    .export-btn {
      padding: 9px 20px; border-radius: 10px; font-size: .85rem;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: opacity .2s; border: none;
    }
    .export-btn.primary {
      background: linear-gradient(135deg, #ff8fb3, #c9a0d8);
      color: #fff;
    }
    .export-btn.secondary {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .export-btn:hover { opacity: .82; }

    /* Export modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; max-width: 460px; width: 90%;
      position: relative;
    }
    .modal-title {
      font-size: 1.1rem; color: var(--gold); letter-spacing: 2px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .modal-sub { font-size: .82rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .modal-plans { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .modal-plan {
      padding: 14px 16px; border-radius: 10px;
      border: 1px solid var(--border); cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex; align-items: center; gap: 12px;
    }
    .modal-plan:hover { border-color: var(--gold); background: rgba(255,143,179,.08); }
    .modal-plan.selected { border-color: var(--gold); background: rgba(255,143,179,.12); }
    .modal-plan-icon { font-size: 1.4rem; flex-shrink: 0; }
    .modal-plan-name { font-size: .9rem; font-weight: 600; }
    .modal-plan-desc { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .modal-plan-price {
      margin-left: auto; font-size: 1.1rem; font-weight: 700;
      color: var(--gold); flex-shrink: 0;
    }
    .modal-actions { display: flex; gap: 10px; }
    .modal-confirm {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #ff8fb3, #c9a0d8);
      color: #fff; font-size: .9rem; cursor: pointer; font-family: inherit;
      transition: opacity .2s;
    }
    .modal-confirm:hover { opacity: .85; }
    .modal-cancel {
      padding: 11px 20px; border-radius: 10px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: .9rem; cursor: pointer; font-family: inherit;
      transition: border-color .2s;
    }
    .modal-cancel:hover { border-color: var(--gold); }
    .modal-success {
      text-align: center; padding: 10px 0; display: none;
    }
    .modal-success-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .modal-success-text { font-size: .95rem; color: var(--jade); letter-spacing: 1px; }

    /* ── Misc ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 0 0 24px; }
    .empty-hint { text-align: center; color: var(--muted); font-size: .88rem; padding: 32px 0; }

    /* ── Responsive ── */
    @media (max-width: 1000px) {
      .stats-grid-5 { grid-template-columns: repeat(3, 1fr); }
      .charts-row-3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 700px) {
      .stats-grid-5 { grid-template-columns: repeat(2, 1fr); }
      .charts-row, .charts-row-3 { grid-template-columns: 1fr; }
      .nav-logo { display: none; }
      .nav-tab { padding: 14px 14px; font-size: .85rem; }
      .export-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ════════════ NAV ════════════ -->
<nav class="nav">
  <div class="nav-logo">✨ 學習報表</div>
  <span class="nav-badge">教師版</span>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab(this,'overview')">&#128202; 全班靈氣大數據</div>
    <div class="nav-tab"       onclick="switchTab(this,'risk')">&#9888;&#65039; 高風險名單</div>
  </div>
</nav>

<!-- ════════════ CLASS SELECTOR ════════════ -->
<div class="class-bar">
  <span class="class-bar-label">班級選擇：</span>
  <div class="class-pills" id="classPills"></div>
</div>

<!-- ════════════ EXPORT MODAL ════════════ -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">&#128196; 匯出班級報表</div>
    <div class="modal-sub">每次匯出為單次計費，請選擇報表格式。匯出完成後可立即下載。</div>
    <div class="modal-plans" id="modalPlans"></div>
    <div class="modal-success" id="modalSuccess">
      <div class="modal-success-icon">✅</div>
      <div class="modal-success-text">報表已產生，正在下載中…</div>
    </div>
    <div class="modal-actions" id="modalActions">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" onclick="confirmExport()">✦ 確認付款並匯出</button>
    </div>
  </div>
</div>

<!-- ════════════ PAGE 1：班級學習數據 ════════════ -->
<div id="page-overview" class="page active">

  <!-- Export bar -->
  <div class="export-bar">
    <div class="export-bar-text">
      <strong>匯出班級報表</strong> — 將本頁所有圖表與數據整合成 PDF 或 Excel 報表，提供給校方或家長。每次匯出單次計費。
    </div>
    <div class="export-btns">
      <button class="export-btn secondary" onclick="openModal('pdf')">&#128196; 匯出 PDF</button>
      <button class="export-btn primary"   onclick="openModal('excel')">&#9989; 匯出 Excel</button>
    </div>
  </div>

  <!-- KPI stats -->
  <div class="stats-grid-5" id="kpiGrid"></div>

  <!-- Trend + Subject -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">全班學習時數趨勢 <span class="card-sub">近 8 週</span></div>
      <div class="toggle-group" id="trendToggle">
        <button class="toggle-btn active" onclick="switchTrend('avg',this)">平均時數</button>
        <button class="toggle-btn"        onclick="switchTrend('total',this)">總時數</button>
        <button class="toggle-btn"        onclick="switchTrend('active',this)">活躍人數</button>
      </div>
      <canvas id="trendChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">學科投入分布 <span class="card-sub">全班平均</span></div>
      <canvas id="subjectChart"></canvas>
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px;">
        <span style="font-size:.78rem;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#d4af37;display:inline-block;"></span>數學</span>
        <span style="font-size:.78rem;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#4aaa4a;display:inline-block;"></span>國文</span>
        <span style="font-size:.78rem;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#5a8ade;display:inline-block;"></span>英文</span>
        <span style="font-size:.78rem;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#e05a5a;display:inline-block;"></span>理化</span>
        <span style="font-size:.78rem;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#d4884a;display:inline-block;"></span>社會</span>
      </div>
    </div>
  </div>

  <!-- Activity popularity + Pace + Time distribution -->
  <div class="charts-row-3">
    <div class="card">
      <div class="card-title">熱門學習活動 <span class="card-sub">本月參與人次</span></div>
      <div class="act-list" id="actList"></div>
    </div>
    <div class="card">
      <div class="card-title">教學進度評估</div>
      <div id="paceCards"></div>
    </div>
    <div class="card">
      <div class="card-title">學習時段分布 <span class="card-sub">全班</span></div>
      <canvas id="timeDistChart"></canvas>
    </div>
  </div>

  <!-- Score distribution -->
  <div class="card chart-full">
    <div class="card-title">全班學習分布直方圖 <span class="card-sub">本月平均分（0–100）</span></div>
    <canvas id="scoreDistChart"></canvas>
  </div>

</div><!-- /page-overview -->


<!-- ════════════ PAGE 2：高風險名單 ════════════ -->
<div id="page-risk" class="page">

  <div class="export-bar">
    <div class="export-bar-text">
      <strong>匯出高風險名單</strong> — 將 AI 標記結果與建議措施整合成報表，方便與輔導老師或家長溝通。每次匯出單次計費。
    </div>
    <div class="export-btns">
      <button class="export-btn secondary" onclick="openModal('risk-pdf')">&#128196; 匯出 PDF</button>
      <button class="export-btn primary"   onclick="openModal('risk-excel')">&#9989; 匯出 Excel</button>
    </div>
  </div>

  <!-- Risk summary cards -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;" id="riskSummaryCards"></div>

  <!-- Risk lists -->
  <div id="riskContent"></div>

</div><!-- /page-risk -->


<script>
// ─────────────────────────────────────────────────────────────────────────────
// Mock class data
// ─────────────────────────────────────────────────────────────────────────────
const CLASSES = [
  {
    id: 'A', label: '三年甲班',

      hoursDelta: '+8%', scoreDelta: '+3%',
    },
    trend: {
      weeks: ['W1','W2','W3','W4','W5','W6','W7','W8'],

      total: [1664,1856,1952,1760,2144,2240,2176,2304],
      active:[26,27,28,25,29,30,28,31],
    },
    subjects: { 數學:28, 國文:18, 英文:22, 理化:20, 社會:12 },
    activities: [

      { name:'數學模擬考',    count:22, color:'rgba(200,160,80,.75)' },
      { name:'英文口說練習',  count:19, color:'rgba(74,112,200,.75)' },
      { name:'物理實驗課',    count:17, color:'rgba(122,90,170,.75)' },
      { name:'醫院志工服務',  count:14, color:'rgba(200,64,64,.75)'  },
      { name:'科學研討會',    count:11, color:'rgba(58,138,120,.6)'  },
      { name:'英文寫作工作坊',count:10, color:'rgba(74,112,200,.6)'  },

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let currentClassIdx = 0;
let currentTrend    = 'avg';
let trendChartInst, subjectChartInst, timeDistInst, scoreDistInst;

// ─────────────────────────────────────────────────────────────────────────────
// Class pills
// ─────────────────────────────────────────────────────────────────────────────
function buildClassPills() {
  const wrap = document.getElementById('classPills');
  wrap.innerHTML = '';
  CLASSES.forEach((cls, idx) => {
    const p = document.createElement('div');
    p.className = 'class-pill' + (idx === currentClassIdx ? ' active' : '');
    p.textContent = cls.label;
    p.onclick = () => { currentClassIdx = idx; buildClassPills(); renderAll(); };
    wrap.appendChild(p);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Render all
// ─────────────────────────────────────────────────────────────────────────────
function renderAll() {
  const c = CLASSES[currentClassIdx];
  renderKPI(c);
  buildTrendChart(c, currentTrend);
  buildSubjectChart(c);
  renderActivities(c);
  renderPace(c);
  buildTimeDistChart(c);
  buildScoreDistChart(c);
  renderRisk(c);
}

// ─────────────────────────────────────────────────────────────────────────────
// KPI cards
// ─────────────────────────────────────────────────────────────────────────────
function renderKPI(c) {
  const k = c.kpi;
  const cards = [
    { label:'班級人數',        value: k.students,                unit:'人',     cls:'',       delta:'' },
    { label:'月均學習時數',    value: k.avgHours,                unit:'小時',   cls:'',       delta: k.hoursDelta, deltaUp: k.hoursDelta.startsWith('+') },
    { label:'活躍學習率',      value: k.activeRate + '%',        unit:'有登入並完成學習', cls: k.activeRate>=85?'ok':k.activeRate>=70?'warn':'danger', delta:'' },
    { label:'平均中斷次數',    value: k.avgInterrupt,            unit:'次 / 人', cls: k.avgInterrupt<=3?'ok':k.avgInterrupt<=6?'warn':'danger', delta:'' },
    { label:'班級平均學習分',  value: k.avgScore,                unit:'/ 100',  cls: k.avgScore>=75?'ok':k.avgScore>=60?'warn':'danger', delta: k.scoreDelta, deltaUp: k.scoreDelta.startsWith('+') },
  ];
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';
  cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'stat-card';
    const deltaHtml = card.delta
      ? `<div class="stat-delta ${card.deltaUp ? 'up' : 'down'}">${card.deltaUp ? '▲' : '▼'} ${card.delta} 較上月</div>`
      : '';
    div.innerHTML = `
      <div class="stat-label">${card.label}</div>
      <div class="stat-value ${card.cls}">${card.value}</div>
      <div class="stat-unit">${card.unit}</div>
      ${deltaHtml}`;
    grid.appendChild(div);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Trend chart
// ─────────────────────────────────────────────────────────────────────────────
function buildTrendChart(c, mode) {
  const dataMap = { avg: c.trend.avg, total: c.trend.total, active: c.trend.active };
  const labelMap = { avg:'平均時數（小時）', total:'總時數（小時）', active:'活躍人數（人）' };
  const data = dataMap[mode];
  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: c.trend.weeks,
      datasets: [{
        data,
        borderColor: '#c8a050', backgroundColor: 'rgba(200,160,80,.1)',
        borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#c8a050',
        fill: true, tension: .35,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: item => ` ${item.raw} ${labelMap[mode].split('（')[1].replace(')','').replace('）','')}` } }
      },
      scales: {
        x: { ticks: { color:'#6a6080' }, grid: { color:'rgba(255,255,255,.04)' } },
        y: { ticks: { color:'#6a6080' }, grid: { color:'rgba(255,255,255,.04)' } }
      }
    }
  });
}

function switchTrend(mode, btn) {
  currentTrend = mode;
  document.querySelectorAll('#trendToggle .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTrendChart(CLASSES[currentClassIdx], mode);
}

// ─────────────────────────────────────────────────────────────────────────────
// Subject doughnut
// ─────────────────────────────────────────────────────────────────────────────
function buildSubjectChart(c) {
  if (subjectChartInst) subjectChartInst.destroy();
  subjectChartInst = new Chart(document.getElementById('subjectChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(c.subjects),
      datasets: [{
        data: Object.values(c.subjects),
        backgroundColor: ['#d4af37','#4aaa4a','#5a8ade','#e05a5a','#d4884a'],
        borderColor: '#07071a', borderWidth: 3,
      }]
    },
    options: {
      responsive: true, cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: item => ` ${item.label} ${item.raw}%` } }
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Activity list
// ─────────────────────────────────────────────────────────────────────────────
function renderActivities(c) {
  const max = Math.max(...c.activities.map(a => a.count));
  const list = document.getElementById('actList');
  list.innerHTML = '';
  c.activities.forEach(a => {
    const pct = (a.count / max * 100).toFixed(0);
    list.innerHTML += `
      <div class="act-item">
        <div class="act-name">${a.name}</div>
        <div class="act-bar-wrap"><div class="act-bar" style="width:${pct}%;background:${a.color};"></div></div>
        <div class="act-count">${a.count} 人</div>
      </div>`;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Pace indicator
// ─────────────────────────────────────────────────────────────────────────────
function renderPace(c) {
  const p = c.pace;
  // score 0=太慢 … 100=太快
  const pct = p.score;
  const msgs = [
    { threshold: 20, label:'偏慢', desc:'整體進度略為落後，可考慮加快課程節奏或增加小測驗頻率。', icon:'🐢' },
    { threshold: 40, label:'適中偏慢', desc:'進度稍慢，整體尚可。適度增加課後延伸活動即可。', icon:'👍' },
    { threshold: 60, label:'適中', desc:'進度與學習節奏吻合，維持現狀。', icon:'✅' },
    { threshold: 80, label:'略快', desc:'部分學生可能趕不上進度，建議增加課後補強或提供線上補救資源。', icon:'⚠️' },
    { threshold: 101, label:'偏快', desc:'多數學生學習壓力偏大，建議放慢節奏並加強基礎觀念複習。', icon:'🔴' },
  ];
  const info = msgs.find(m => pct < m.threshold);
  const fillColor = pct < 40 ? 'rgba(74,112,200,.75)' : pct < 65 ? 'rgba(58,138,120,.75)' : 'rgba(200,120,32,.8)';

  document.getElementById('paceCards').innerHTML = `
    <div style="text-align:center;font-size:2rem;margin-bottom:8px;">${info.icon}</div>
    <div style="text-align:center;font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:4px;">${info.label}</div>
    <div class="pace-wrap" style="margin-bottom:6px;">
      <div class="pace-track">
        <div class="pace-fill" style="width:${pct}%;background:${fillColor};"></div>
      </div>
    </div>
    <div class="pace-zones"><span>太慢</span><span>適中</span><span>太快</span></div>
    <div style="font-size:.78rem;color:var(--muted);line-height:1.6;margin-top:10px;">${info.desc}</div>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;">
        <span>完成進度 ≥70% 學生</span>
        <span style="color:var(--jade);font-weight:600;">${Math.round(c.kpi.activeRate * 0.9)}%</span>
      </div>
      <div style="font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;">
        <span>需補救學生估計</span>
        <span style="color:var(--red);font-weight:600;">${Math.round(c.kpi.students * (1 - c.kpi.activeRate / 100 * 0.85))} 人</span>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Time distribution (24h bar)
// ─────────────────────────────────────────────────────────────────────────────
function buildTimeDistChart(c) {
  const labels = Array.from({length:24}, (_,i) => i%4===0 ? `${i}時` : '');
  const colors = c.timeDist.map(v =>
    v >= 100 ? 'rgba(200,160,80,.85)' :
    v >= 60  ? 'rgba(58,138,120,.8)'  :
    v >= 25  ? 'rgba(74,112,200,.7)'  : 'rgba(100,90,130,.5)');
  if (timeDistInst) timeDistInst.destroy();
  timeDistInst = new Chart(document.getElementById('timeDistChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: c.timeDist, backgroundColor: colors, borderRadius: 3, borderSkipped: false }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: i => `${i[0].dataIndex}:00 ~ ${i[0].dataIndex+1}:00`,
          label: i => ` ${i.raw} 人在學習`
        }}
      },
      scales: {
        x: { ticks: { color:'#6a6080', font:{size:9} }, grid: { color:'rgba(255,255,255,.04)' } },
        y: { ticks: { color:'#6a6080' }, grid: { color:'rgba(255,255,255,.04)' } }
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Score distribution histogram
// ─────────────────────────────────────────────────────────────────────────────
function buildScoreDistChart(c) {
  const labels = ['0–10','11–20','21–30','31–40','41–50','51–60','61–70','71–80','81–90','91–100'];
  const colors = c.scoreDist.map((_, i) =>
    i <= 3 ? 'rgba(200,64,64,.7)' : i <= 5 ? 'rgba(200,120,32,.7)' : i <= 7 ? 'rgba(58,138,120,.75)' : 'rgba(200,160,80,.85)');
  if (scoreDistInst) scoreDistInst.destroy();
  scoreDistInst = new Chart(document.getElementById('scoreDistChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: c.scoreDist, backgroundColor: colors, borderRadius: 4, borderSkipped: false }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: i => ` ${i.raw} 人` } }
      },
      scales: {
        x: { ticks: { color:'#6a6080' }, grid: { color:'rgba(255,255,255,.04)' } },
        y: {
          ticks: { color:'#6a6080', stepSize: 1 },
          grid: { color:'rgba(255,255,255,.04)' }
        }
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Risk page
// ─────────────────────────────────────────────────────────────────────────────
function renderRisk(c) {
  const students = c.riskStudents;
  const quitList  = students.filter(s => s.type === 'quit');
  const overList  = students.filter(s => s.type === 'over');
  const watchList = students.filter(s => s.type === 'watch');

  // Summary cards
  const summaryEl = document.getElementById('riskSummaryCards');
  summaryEl.innerHTML = `
    <div class="stat-card" style="border-color:rgba(200,64,64,.4);background:rgba(200,64,64,.04);">
      <div class="stat-label">放棄學習</div>
      <div class="stat-value danger">${quitList.length}</div>
      <div class="stat-unit">名學生需立即關注</div>
    </div>
    <div class="stat-card" style="border-color:rgba(200,120,32,.4);background:rgba(200,120,32,.04);">
      <div class="stat-label">走火入魔（過度學習）</div>
      <div class="stat-value warn">${overList.length}</div>
      <div class="stat-unit">名學生需關心身心狀態</div>
    </div>
    <div class="stat-card" style="border-color:rgba(122,90,170,.4);background:rgba(122,90,170,.04);">
      <div class="stat-label">觀察名單</div>
      <div class="stat-value" style="color:var(--purple);">${watchList.length}</div>
      <div class="stat-unit">名學生表現趨勢下滑</div>
    </div>`;

  const content = document.getElementById('riskContent');
  content.innerHTML = '';

  [
    { list: quitList,  type:'quit',  icon:'🚨', title:'放棄學習 — 高風險',     badge:'quit',  badgeText:'放棄學習' },
    { list: overList,  type:'over',  icon:'🔥', title:'走火入魔 — 過度學習',   badge:'over',  badgeText:'過度學習' },
    { list: watchList, type:'watch', icon:'👀', title:'觀察名單 — 表現下滑',   badge:'watch', badgeText:'觀察中' },
  ].forEach(section => {
    if (!section.list.length) return;
    const sec = document.createElement('div');
    sec.className = 'risk-section';
    sec.innerHTML = `
      <div class="risk-section-title">
        <span>${section.icon}</span>
        <span>${section.title}</span>
        <span class="risk-badge ${section.badge}">${section.badgeText}</span>
        <span class="risk-count">${section.list.length} 名學生</span>
      </div>
      <div class="risk-cards" id="riskCards-${section.type}"></div>`;
    content.appendChild(sec);

    const cardsEl = sec.querySelector(`#riskCards-${section.type}`);
    section.list.forEach(s => {
      const card = document.createElement('div');
      card.className = `risk-card ${s.type}`;
      card.innerHTML = `
        <div class="risk-avatar">${s.avatar}</div>
        <div class="risk-info">
          <div class="risk-name">${s.name} <span style="font-size:.72rem;color:var(--muted);font-weight:400;">座號 ${s.seat}</span></div>
          <div class="risk-meta">AI 自動標記</div>
          <div class="risk-tags">${s.tags.map(t => `<span class="risk-tag">${t}</span>`).join('')}</div>
          <div class="risk-suggestion">💡 ${s.suggestion}</div>
        </div>
        <div class="risk-metrics">
          <div class="risk-metric-row">
            <div class="risk-metric-val">${s.hours}</div>
            <div class="risk-metric-lbl">本月學習時數</div>
          </div>
          <div class="risk-metric-row" style="margin-top:8px;">
            <div class="risk-metric-val">${s.interrupt}</div>
            <div class="risk-metric-lbl">中斷次數</div>
          </div>
          <div class="risk-metric-row" style="margin-top:8px;">
            <div class="risk-metric-val" style="color:var(--muted);">${s.score}</div>
            <div class="risk-metric-lbl">學習分</div>
          </div>
        </div>`;
      cardsEl.appendChild(card);
    });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Export modal
// ─────────────────────────────────────────────────────────────────────────────
const EXPORT_PLANS = {
  pdf:        { icon:'📄', name:'班級總覽報表 PDF', desc:'包含全班統計數據、圖表截圖、趨勢分析', price:'NT$49' },
  excel:      { icon:'📊', name:'班級數據 Excel',   desc:'原始數據表格，可自行篩選分析',            price:'NT$39' },
  'risk-pdf': { icon:'🚨', name:'高風險名單報表 PDF', desc:'AI 標記學生明細、建議措施、聯絡記錄欄',  price:'NT$49' },
  'risk-excel':{ icon:'📋', name:'高風險名單 Excel', desc:'可直接填入處理進度，與輔導老師共用',       price:'NT$39' },
};
let selectedExportType = '';

function openModal(type) {
  selectedExportType = type;
  const plan = EXPORT_PLANS[type];
  document.getElementById('modalPlans').innerHTML = `
    <div class="modal-plan selected">
      <div class="modal-plan-icon">${plan.icon}</div>
      <div>
        <div class="modal-plan-name">${plan.name}</div>
        <div class="modal-plan-desc">${plan.desc}</div>
      </div>
      <div class="modal-plan-price">${plan.price}</div>
    </div>`;
  document.getElementById('modalSuccess').style.display = 'none';
  document.getElementById('modalActions').style.display = 'flex';
  document.getElementById('exportModal').classList.add('open');
}

function closeModal() {
  document.getElementById('exportModal').classList.remove('open');
}

function confirmExport() {
  document.getElementById('modalActions').style.display = 'none';
  document.getElementById('modalSuccess').style.display = 'block';
  setTimeout(() => closeModal(), 2200);
}

document.getElementById('exportModal').addEventListener('click', e => {
  if (e.target === document.getElementById('exportModal')) closeModal();
});

// ─────────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(el, tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p =>
    p.classList.toggle('active', p.id === `page-${tab}`)
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
buildClassPills();
renderAll();
</script>
