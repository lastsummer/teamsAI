<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仙途修煉 · 家長總覽</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #07071a;
      --card:     #0f0f28;
      --card2:    #141430;
      --border:   #252545;
      --gold:     #c8a050;
      --gold2:    #e8c070;
      --jade:     #3a8a78;
      --purple:   #7a5aaa;
      --blue:     #4a70c8;
      --red:      #c84040;
      --text:     #d8ccc0;
      --muted:    #6a6080;
      --radius:   12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 10%, rgba(122,90,170,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(58,138,120,.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 20px rgba(0,0,0,.5);
      gap: 0;
    }
    .nav-logo {
      color: var(--gold); font-size: 1.1rem; letter-spacing: 3px;
      padding: 14px 24px 14px 0; margin-right: 24px;
      border-right: 1px solid var(--border); white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-parent-badge {
      font-size: .72rem; padding: 2px 8px; border-radius: 8px;
      background: rgba(122,90,170,.22); color: var(--purple);
      border: 1px solid rgba(122,90,170,.35);
      margin-right: 20px; white-space: nowrap; flex-shrink: 0;
      letter-spacing: 1px;
    }
    .nav-tabs { display: flex; flex: 1; }
    .nav-tab {
      padding: 16px 28px; cursor: pointer;
      color: var(--muted); font-size: .95rem;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none; white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Child Switcher ── */
    .child-bar {
      background: var(--card2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 53px; z-index: 190;
    }
    .child-bar-label {
      font-size: .78rem; color: var(--muted); letter-spacing: 1px; flex-shrink: 0;
    }
    .child-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .child-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: .88rem;
      transition: all .2s; user-select: none;
    }
    .child-pill:hover { border-color: var(--gold); color: var(--text); }
    .child-pill.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }
    .child-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; line-height: 1;
      background: rgba(255,255,255,.1);
    }
    .child-pill.active .child-avatar { background: rgba(0,0,0,.15); }

    /* ── Pages ── */
    .page { display: none; padding: 28px 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
    .page.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-title {
      color: var(--gold); font-size: .95rem; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
    }
    .card-title::before { content: '◆'; font-size: .65rem; opacity: .7; }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .stat-card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(200,160,80,.12); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; }
    .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-value.danger { color: var(--red); }
    .stat-value.good  { color: var(--jade); }
    .stat-unit { font-size: .78rem; color: var(--muted); margin-top: 6px; }

    /* ── Grid layouts ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-full { margin-bottom: 24px; }
    .two-col { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }

    /* ── Toggle buttons ── */
    .toggle-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .toggle-btn {
      padding: 6px 18px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: .83rem; transition: all .2s;
    }
    .toggle-btn:hover { border-color: var(--gold); color: var(--text); }
    .toggle-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }

    /* ── Date nav ── */
    .date-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 16px;
    }
    .date-nav-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--gold); width: 34px; height: 34px;
      border-radius: 6px; cursor: pointer;
      font-size: 1.4rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
    }
    .date-nav-btn:hover { border-color: var(--gold); background: rgba(200,160,80,.12); }
    .date-nav-label {
      font-size: .9rem; color: var(--text);
      min-width: 190px; text-align: center; letter-spacing: 1px;
    }

    /* ── Wuxing legend ── */
    .wuxing-legend {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 14px;
    }
    .wuxing-item { display: flex; align-items: center; gap: 6px; font-size: .82rem; }
    .wuxing-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Calendar ── */
    .calendar-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .calendar-month { font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; }
    .calendar-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: .9rem; transition: border-color .2s;
    }
    .calendar-btn:hover { border-color: var(--gold); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-header { text-align: center; font-size: .75rem; color: var(--muted); padding: 6px 0; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer;
      transition: background .15s; position: relative; font-size: .88rem;
    }
    .cal-day:hover { background: var(--border); }
    .cal-day.today {
      background: rgba(200,160,80,.18); border: 1px solid rgba(200,160,80,.6);
      color: var(--gold); font-weight: 700;
    }
    .cal-day.has-event::after {
      content: '✦'; position: absolute; bottom: 2px;
      font-size: .55rem; color: var(--jade);
    }
    .cal-day.empty { pointer-events: none; }
    .cal-tooltip {
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: #1e1e40; border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      font-size: .75rem; color: var(--text);
      white-space: nowrap; z-index: 50;
      pointer-events: none; display: none;
    }
    .cal-day:hover .cal-tooltip { display: block; }

    /* ── Event list ── */
    .event-list { display: flex; flex-direction: column; gap: 12px; }
    .event-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; background: rgba(255,255,255,.02);
      border-radius: 8px; border-left: 3px solid var(--jade);
      transition: background .2s;
    }
    .event-item:hover { background: rgba(255,255,255,.05); }
    .event-date { min-width: 44px; text-align: center; }
    .event-date .e-month { font-size: .7rem; color: var(--muted); }
    .event-date .e-day { font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .event-name { font-size: .92rem; margin-bottom: 4px; }
    .event-desc { font-size: .78rem; color: var(--muted); }
    .event-badge {
      display: inline-block; font-size: .68rem; padding: 2px 8px;
      border-radius: 10px; margin-top: 5px;
      background: rgba(58,138,120,.2); color: var(--jade); border: 1px solid rgba(58,138,120,.3);
    }

    /* ── Parent summary card ── */
    .summary-banner {
      display: flex; align-items: flex-start; gap: 20px;
      padding: 20px; margin-bottom: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .child-big-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--jade));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
      border: 2px solid rgba(200,160,80,.3);
    }
    .summary-info { flex: 1; }
    .summary-name { font-size: 1.3rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
    .summary-meta { font-size: .82rem; color: var(--muted); letter-spacing: .5px; margin-bottom: 12px; }
    .summary-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .summary-tag {
      font-size: .72rem; padding: 3px 10px; border-radius: 10px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .summary-tag.warn { border-color: rgba(200,64,64,.4); color: var(--red); background: rgba(200,64,64,.06); }
    .summary-tag.ok   { border-color: rgba(58,138,120,.4); color: var(--jade); background: rgba(58,138,120,.06); }
    .summary-score-area { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .summary-score-label { font-size: .72rem; color: var(--muted); }
    .summary-score { font-size: 2.4rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .summary-score-sub { font-size: .72rem; color: var(--muted); }

    /* ── Insight cards ── */
    .insight-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
    .insight-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .insight-icon { font-size: 1.6rem; margin-bottom: 8px; }
    .insight-title { font-size: .78rem; color: var(--muted); margin-bottom: 6px; letter-spacing: 1px; }
    .insight-body { font-size: .9rem; color: var(--text); line-height: 1.6; }
    .insight-body strong { color: var(--gold); }
    .insight-body.warn strong { color: var(--red); }

    /* ── AI Elder chat ── */
    .elder-wrap { margin-top: 24px; }
    .elder-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .elder-title-row { display: flex; align-items: center; gap: 10px; }
    .elder-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #7a5aaa, #3a8a78);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(122,90,170,.4);
    }
    .elder-name { color: var(--gold); font-size: 1rem; letter-spacing: 2px; }
    .elder-sub  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .elder-quota {
      font-size: .78rem; color: var(--muted); letter-spacing: .5px;
      display: flex; align-items: center; gap: 6px;
    }
    .elder-quota-dots { display: flex; gap: 4px; }
    .elder-quota-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--jade); transition: background .3s;
    }
    .elder-quota-dot.used { background: var(--border); }

    .chat-messages {
      display: flex; flex-direction: column; gap: 14px;
      max-height: 420px; overflow-y: auto;
      padding-right: 4px; margin-bottom: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-msg { display: flex; gap: 10px; align-items: flex-start; }
    .chat-msg.user { flex-direction: row-reverse; }
    .chat-msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .chat-msg.ai   .chat-msg-avatar { background: linear-gradient(135deg, #7a5aaa, #3a8a78); }
    .chat-msg.user .chat-msg-avatar { background: rgba(200,160,80,.2); border: 1px solid rgba(200,160,80,.3); }

    .chat-msg-bubble {
      max-width: 80%; padding: 12px 16px; border-radius: 14px;
      font-size: .88rem; line-height: 1.7;
    }
    .chat-msg.ai   .chat-msg-bubble {
      background: rgba(122,90,170,.12); border: 1px solid rgba(122,90,170,.25);
      border-top-left-radius: 4px; color: var(--text);
    }
    .chat-msg.user .chat-msg-bubble {
      background: rgba(200,160,80,.1); border: 1px solid rgba(200,160,80,.25);
      border-top-right-radius: 4px; color: var(--text);
    }
    .chat-msg-bubble em { color: var(--gold); font-style: normal; }
    .chat-msg-bubble strong { color: var(--jade); }

    .chat-typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: typingBounce .9s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30%           { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
    .chat-input {
      flex: 1; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      color: var(--text); font-size: .88rem; resize: none;
      font-family: inherit; line-height: 1.5; outline: none;
      transition: border-color .2s; min-height: 44px; max-height: 120px;
    }
    .chat-input:focus { border-color: var(--purple); }
    .chat-input::placeholder { color: var(--muted); }
    .chat-send-btn {
      padding: 10px 20px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--jade));
      border: none; color: #fff; font-size: .88rem;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: opacity .2s; font-family: inherit;
    }
    .chat-send-btn:hover:not(:disabled) { opacity: .85; }
    .chat-send-btn:disabled { opacity: .35; cursor: not-allowed; }

    .elder-paywall {
      margin-top: 12px; padding: 14px 18px;
      border: 1px solid rgba(200,160,80,.4); border-radius: 10px;
      background: linear-gradient(90deg, rgba(200,160,80,.06), rgba(122,90,170,.06));
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .paywall-text { font-size: .83rem; color: var(--muted); line-height: 1.5; }
    .paywall-text strong { color: var(--gold); }
    .paywall-btn {
      padding: 8px 20px; border-radius: 20px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--purple));
      border: none; color: #fff; font-size: .82rem;
      cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity .2s;
    }
    .paywall-btn:hover { opacity: .85; }

    /* ── Divider ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 4px 0 24px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .insight-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .nav-logo { display: none; }
      .nav-tab { padding: 14px 16px; font-size: .85rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-value { font-size: 1.7rem; }
      .insight-row { grid-template-columns: 1fr; }
      .summary-banner { flex-wrap: wrap; }
      .summary-score-area { align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ════════════════ NAV ════════════════ -->
<nav class="nav">
  <div class="nav-logo">&#9651; 仙途修煉</div>
  <span class="nav-parent-badge">家長總覽</span>
  <div class="nav-tabs">
    <div class="nav-tab active" data-tab="cultivation" onclick="switchTab(this,'cultivation')">&#9889; 修煉殿</div>
    <div class="nav-tab"       data-tab="activities"  onclick="switchTab(this,'activities')">&#128220; 功法殿</div>
  </div>
</nav>

<!-- ════════════════ CHILD SWITCHER ════════════════ -->
<div class="child-bar">
  <span class="child-bar-label">弟子：</span>
  <div class="child-pills" id="childPills"></div>
</div>

<!-- ════════════════ PAGE 1：修煉殿 ════════════════ -->
<div id="page-cultivation" class="page active">

  <!-- Child summary banner -->
  <div class="summary-banner" id="summaryBanner">
    <div class="child-big-avatar" id="summaryAvatar"></div>
    <div class="summary-info">
      <div class="summary-name" id="summaryName"></div>
      <div class="summary-meta" id="summaryMeta"></div>
      <div class="summary-tags" id="summaryTags"></div>
    </div>
    <div class="summary-score-area">
      <div class="summary-score-label">近期學習分</div>
      <div class="summary-score" id="summaryScore"></div>
      <div class="summary-score-sub">/ 100</div>
    </div>
  </div>

  <!-- Parent insights -->
  <div class="insight-row" id="insightRow"></div>

  <div class="divider"></div>

  <!-- Stat cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">累計修煉時長</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-unit">小時</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">修煉次數</div>
      <div class="stat-value" id="statCount">—</div>
      <div class="stat-unit">次</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">日均修煉時長</div>
      <div class="stat-value" id="statAvg">—</div>
      <div class="stat-unit">分鐘 / 天</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">修煉中斷（放棄學習）</div>
      <div class="stat-value danger" id="statInterrupt">—</div>
      <div class="stat-unit">次</div>
    </div>
  </div>

  <!-- Radar + Hourly -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">五行修煉分布圖</div>
      <canvas id="wuxingChart"></canvas>
      <div class="wuxing-legend">
        <div class="wuxing-item"><div class="wuxing-dot" style="background:#d4af37"></div><span style="color:#d4af37">金</span>&nbsp;數學</div>
        <div class="wuxing-item"><div class="wuxing-dot" style="background:#4aaa4a"></div><span style="color:#4aaa4a">木</span>&nbsp;國文</div>
        <div class="wuxing-item"><div class="wuxing-dot" style="background:#5a8ade"></div><span style="color:#5a8ade">水</span>&nbsp;英文</div>
        <div class="wuxing-item"><div class="wuxing-dot" style="background:#e05a5a"></div><span style="color:#e05a5a">火</span>&nbsp;理化</div>
        <div class="wuxing-item"><div class="wuxing-dot" style="background:#d4884a"></div><span style="color:#d4884a">土</span>&nbsp;社會</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">修煉時段分布</div>
      <div class="toggle-group" id="hourlyToggle" style="margin-bottom:12px;">
        <button class="toggle-btn active" onclick="switchHourlyMode('hour',this)">24小時</button>
        <button class="toggle-btn"        onclick="switchHourlyMode('weekday',this)">星期累積</button>
      </div>
      <canvas id="hourlyChart"></canvas>
    </div>
  </div>

  <!-- Daily/Weekly/Monthly toggle -->
  <div class="card chart-full">
    <div class="card-title">修煉分布</div>

// ── Build child pills ─────────────────────────────────────────────────────────
function buildChildPills() {
  const container = document.getElementById('childPills');
  container.innerHTML = '';
  CHILDREN.forEach((child, idx) => {
    const pill = document.createElement('div');
    pill.className = 'child-pill' + (idx === currentChildIdx ? ' active' : '');
    pill.innerHTML = `<span class="child-avatar">${child.avatar}</span>${child.name}`;
    pill.onclick = () => selectChild(idx);
    container.appendChild(pill);
  });
}

function selectChild(idx) {
  currentChildIdx = idx;
  buildChildPills();
  renderAll();
}

// ── Render all for current child ──────────────────────────────────────────────
function renderAll() {
  const c = CHILDREN[currentChildIdx];
  renderSummary(c);
  renderInsights(c);
  renderStatCards(c);
  buildWuxingChart(c);
  buildHourlyChart(hourlyMode);
  currentPeriod = 'day';
  currentMetric = 'duration';
  document.querySelectorAll('#periodToggle .toggle-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('#metricToggle .toggle-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  buildDuration('day');
  renderCal();
  renderEvents(c);
  initElder();
}

// ── Summary banner ────────────────────────────────────────────────────────────
function renderSummary(c) {
  document.getElementById('summaryAvatar').textContent = c.avatar;
  document.getElementById('summaryName').textContent   = c.name;
  document.getElementById('summaryMeta').textContent   = `${c.grade} · ${c.school}`;
  document.getElementById('summaryScore').textContent  = c.score;

  const tagsEl = document.getElementById('summaryTags');
  tagsEl.innerHTML = '';
  c.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'summary-tag' + (t.type ? ` ${t.type}` : '');
    span.textContent = t.text;
    tagsEl.appendChild(span);
  });
}

// ── Insights ─────────────────────────────────────────────────────────────────
function renderInsights(c) {
  const row = document.getElementById('insightRow');
  row.innerHTML = '';
  c.insights.forEach(ins => {
    const div = document.createElement('div');
    div.className = 'insight-card';
    div.innerHTML = `
      <div class="insight-icon">${ins.icon}</div>
      <div class="insight-title">${ins.title}</div>
      <div class="insight-body${ins.warn ? ' warn' : ''}">${ins.body}</div>`;
    row.appendChild(div);
  });
}

  document.getElementById('statTotal').textContent     = c.stats.total;

  document.getElementById('statAvg').textContent       = c.stats.avg;
  document.getElementById('statInterrupt').textContent = c.stats.interrupt;

// ── Wuxing chart ──────────────────────────────────────────────────────────────
function buildWuxingChart(c) {
  if (wuxingChartInst) wuxingChartInst.destroy();
  wuxingChartInst = new Chart(document.getElementById('wuxingChart'), {
    type: 'radar',
    data: {
      labels: Object.keys(c.wuxing),
      datasets: [{
        data: Object.values(c.wuxing),
        backgroundColor: 'rgba(200,160,80,.12)',
        borderColor: '#c8a050',
        borderWidth: 2,
        pointBackgroundColor: ['#d4af37','#4aaa4a','#5a8ade','#e05a5a','#d4884a'],
        pointBorderColor: '#fff',
        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 60,
          ticks: { color:'#6a6080', backdropColor:'transparent', stepSize:20, font:{size:10} },
          grid: { color:'rgba(255,255,255,.08)' },
          angleLines: { color:'rgba(255,255,255,.08)' },
          pointLabels: { color:'#d8ccc0', font:{size:12} }

      }
    }
  });
}

    : ['一','二','三','四','五','六','日'];
  const data   = isHour ? c.hourly : c.weekdayDuration;
  const colors = isHour
    ? data.map(v => v>=70 ? 'rgba(200,160,80,.85)' : v>=45 ? 'rgba(58,138,120,.8)' : v>=20 ? 'rgba(74,112,200,.7)' : 'rgba(100,90,130,.5)')

  if (hourlyChartInst) hourlyChartInst.destroy();
  hourlyChartInst = new Chart(document.getElementById('hourlyChart'), {
    type: 'bar',

// ── Duration chart ────────────────────────────────────────────────────────────
function seedValues(date, source, scale) {
  const seed  = date.getFullYear() * 10000 + (date.getMonth()+1) * 100 + date.getDate();
  const shift = seed % source.length;
  return source.map((v, i) => {
    const varied = source[(i + shift) % source.length];
    return Math.max(0, Math.round(varied * (scale + (((seed * (i+7)) % 100) / (scale > 0.75 ? 167 : 500)))));
  });
}
function getWeekValues(weekStart, source) {
  const labels = [], values = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
    labels.push(`${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[d.getDay()]})`);
    values.push(source[(d.getDate()-1) % source.length]);
  }
  return { labels, values };
}
function getMonthValues(monthDate, source) {
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const days = new Date(y, m+1, 0).getDate();
  const labels = [], values = [];
  for (let d = 1; d <= days; d++) {
    labels.push(d % 5 === 1 ? `${d}日` : '');
    values.push(source[(d-1) % source.length]);
  }
  return { labels, values };
}

function updateDateNav() {
  const label = document.getElementById('dateNavLabel');
  if (currentPeriod === 'day') {
    const y = selectedDate.getFullYear();
    const m = String(selectedDate.getMonth()+1).padStart(2,'0');
    const d = String(selectedDate.getDate()).padStart(2,'0');
    label.textContent = `${y} / ${m} / ${d}`;
  } else if (currentPeriod === 'week') {
    const end = new Date(selectedWeek.getFullYear(), selectedWeek.getMonth(), selectedWeek.getDate()+6);
    const fmt = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    label.textContent = `${fmt(selectedWeek)} ～ ${fmt(end)}`;
  } else if (currentPeriod === 'month') {
    const y = selectedMonth.getFullYear(), mo = selectedMonth.getMonth();
    const ms = String(mo+1).padStart(2,'0');
    const last = new Date(y, mo+1, 0).getDate();
    label.textContent = `${y}/${ms}/01 ～ ${y}/${ms}/${String(last).padStart(2,'0')}`;
  } else {
    label.textContent = `${selectedYear} 年`;
  }
}

function buildDuration(period) {
  const c = CHILDREN[currentChildIdx];
  let labels, durVals, cntVals, intVals;

  if (period === 'day') {
    labels  = Array.from({length:24}, (_,i) => i%4===0 ? `${i}時` : '');
    durVals = seedValues(selectedDate, c.hourly, 0.7);
    cntVals = seedValues(selectedDate, c.dailyCount, 0.8);
    intVals = seedValues(selectedDate, c.dailyInt, 0.8);
  } else if (period === 'week') {
    const dur = getWeekValues(selectedWeek, c.daily);
    const cnt = getWeekValues(selectedWeek, c.dailyCount);
    const int = getWeekValues(selectedWeek, c.dailyInt);
    labels = dur.labels; durVals = dur.values; cntVals = cnt.values; intVals = int.values;
  } else if (period === 'month') {
    const dur = getMonthValues(selectedMonth, c.daily);
    const cnt = getMonthValues(selectedMonth, c.dailyCount);
    const int = getMonthValues(selectedMonth, c.dailyInt);
    labels = dur.labels; durVals = dur.values; cntVals = cnt.values; intVals = int.values;
  } else {
    labels  = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    durVals = c.yearlyDur;
    cntVals = c.yearlyCount;
    intVals = c.yearlyInt;
  }

  const totalDur = durVals.reduce((a,b) => a+b, 0);
  const durEl  = document.getElementById('distDuration');
  const unitEl = document.getElementById('distDurationUnit');
  if (totalDur >= 60) { durEl.textContent = (totalDur/60).toFixed(1); unitEl.textContent = '小時'; }
  else                { durEl.textContent = totalDur; unitEl.textContent = '分鐘'; }
  document.getElementById('distCount').textContent     = cntVals.reduce((a,b)=>a+b,0);
  document.getElementById('distInterrupt').textContent = intVals.reduce((a,b)=>a+b,0);

  let values, colors, tooltipLabel;
  if (currentMetric === 'duration') {
    values = durVals;
    colors = period === 'day'
      ? durVals.map(v => v>=70 ? 'rgba(200,160,80,.85)' : v>=45 ? 'rgba(58,138,120,.8)' : v>=20 ? 'rgba(74,112,200,.7)' : 'rgba(100,90,130,.5)')
      : 'rgba(58,138,120,.65)';
    tooltipLabel = item => ` 修煉 ${item.raw} 分鐘`;
  } else if (currentMetric === 'count') {
    values = cntVals; colors = 'rgba(122,90,170,.7)';
    tooltipLabel = item => ` 修煉 ${item.raw} 次`;
  } else {
    values = intVals; colors = 'rgba(200,64,64,.7)';
    tooltipLabel = item => ` 中斷 ${item.raw} 次`;
  }

  updateDateNav();
  if (durationChart) durationChart.destroy();
  durationChart = new Chart(document.getElementById('durationChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: Array.isArray(colors) ? colors.map(cc => cc.replace(/[\d.]+\)$/, '1)')) : colors.replace(/[\d.]+\)$/, '1)'),
        borderWidth: 1, borderRadius: 5, borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => period === 'day'
              ? `${items[0].dataIndex}:00 ~ ${items[0].dataIndex+1}:00`
              : items[0].label,
            label: tooltipLabel
          }
        }
      },
      scales: {
        x: { ticks: { color:'#6a6080', maxRotation: period==='week'?30:0 }, grid: { color:'rgba(255,255,255,.04)' } },
        y: { ticks: { color:'#6a6080' }, grid: { color:'rgba(255,255,255,.04)' } }
      }
    }
  });
}

function navigateDate(delta) {
  if (currentPeriod === 'day') {
    selectedDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate()+delta);
  } else if (currentPeriod === 'week') {
    selectedWeek = new Date(selectedWeek.getFullYear(), selectedWeek.getMonth(), selectedWeek.getDate()+delta*7);
  } else if (currentPeriod === 'month') {
    selectedMonth = new Date(selectedMonth.getFullYear(), selectedMonth.getMonth()+delta, 1);
  } else {
    selectedYear += delta;
  }
  buildDuration(currentPeriod);
}

function switchMetric(metric, btn) {

function renderCal() {
  const c  = CHILDREN[currentChildIdx];
  const yr = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('calTitle').textContent = `${yr} 年 ${CN_MONTHS[mo]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-header'; el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMo = new Date(yr, mo+1, 0).getDate();
  const today    = new Date();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMo; d++) {
    const el  = document.createElement('div');
    el.className = 'cal-day';
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===yr && today.getMonth()===mo && today.getDate()===d;
    if (isToday)            el.classList.add('today');
    if (c.activities[key])  el.classList.add('has-event');
    el.innerHTML = `<span>${d}</span>`;
    if (c.activities[key]) {
      const tip = document.createElement('div');
      tip.className = 'cal-tooltip';
      tip.textContent = c.activities[key].join(' / ');
      el.appendChild(tip);
    }
    grid.appendChild(el);
  }
}

function getElderInit() {

function getElderResponse(userMsg) {
  const c   = CHILDREN[currentChildIdx];
  const pool = ELDER_DATA[c.id]?.responses ?? [];
  const msg  = userMsg;

  // keyword match
  if (/志工|服務|醫院/.test(msg))              return pool[0] ?? '';
  if (/研討會|科展|發表|論壇/.test(msg))       return pool[1] ?? '';
  if (/英文|語文|閱讀/.test(msg))              return pool[2] ?? '';
  if (/考試|模擬|複習|備考/.test(msg))         return pool[3] ?? '';
  if (/方向|科系|選系|未來|志願/.test(msg))    return pool[4] ?? '';

  // fallback: rotate
  const unused = pool.filter(r => !usedResponses.includes(r));
  const picked = (unused.length ? unused : pool)[Math.floor(Math.random() * (unused.length || pool.length))];
  usedResponses.push(picked);
  return picked;
}

  const sendBtn  = document.getElementById('chatSendBtn');

    input.placeholder = '問詢次數已達上限（10次）';

    paywall.style.display = 'flex';
    sendBtn.disabled = true; input.disabled = true;
    input.placeholder = '請解鎖後繼續問詢…';

function sendChat() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || chatTurns >= MAX_TURNS) return;
  if (chatTurns >= FREE_QUOTA && !paidUnlocked) return;
  input.value = ''; input.style.height = '';
  appendMsg('user', text);
  chatTurns++;
  renderQuota();
  document.getElementById('chatSendBtn').disabled = true;
  appendTyping();
  setTimeout(() => {
    removeTyping();
    appendMsg('ai', getElderResponse(text));
    document.getElementById('chatSendBtn').disabled = false;
    checkPaywall();
  }, 900 + Math.random() * 600);
}

  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  const ta = e.target;
  ta.style.height = '';

}

  const c = CHILDREN[currentChildIdx];
  document.getElementById('elderSub').textContent = `依 ${c.name} 的活動參與紀錄，給予學習方向建議`;
  renderQuota();
  appendMsg('ai', getElderInit());
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(el, tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p =>
    p.classList.toggle('active', p.id === `page-${tab}`)
  );
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildChildPills();
renderAll();
</script>
</body>
